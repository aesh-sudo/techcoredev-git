name: cd

on:
  push:
    branches:
      - main

jobs:
  build-push:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v7

        # Установим QEMU - эмулятор для сборки под разные архитектуры
      - name: set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: linux/amd64,linux/arm64

        # Устанавливаем buildx - расширенный сборщик docker-образов
      - name: set up docker buildx
        uses: docker/setup-buildx-action@v4

      - name: login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: build and push
        uses: docker/build-push-action@v7
        with:
          context: ./m08/t04-docker-build-and-push
          file: ./m08/t04-docker-build-and-push/docker/dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/aesh-sudo/m08-t08-multi-arch-build:latest
            ghcr.io/aesh-sudo/m08-t08-multi-arch-build:${{ github.sha }}
